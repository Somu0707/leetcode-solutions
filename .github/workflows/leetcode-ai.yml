name: LeetCode AI Automation

on:
  push:
    branches:
      - main

jobs:
  detect-problem:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect Changed Files
        id: changed
        run: |
          echo "Changed files:"
          git diff --name-only HEAD^ HEAD

      - name: Detect New Problem Folder
        run: |
          folder=$(git diff --name-only HEAD^ HEAD | cut -d'/' -f1 | sort -u | grep -E '^[0-9]{4}-' | head -1)

          if [ -z "$folder" ]; then
            echo "No new LeetCode problem detected."
          else
            echo "New problem detected:"
            echo "$folder"
          fi
